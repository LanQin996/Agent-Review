name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  ai-review:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # 当前仓库自测时使用本地 CLI；发布到 npm 后可改为：
      #   npx ai-pr-reviewer --post
      - name: Run AI PR reviewer
        run: node ./bin/ai-pr-reviewer.js --post
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.5' }}
          # 第三方 / 自建 OpenAI-compatible 服务时配置，例如：https://api.example.com/v1
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL || 'https://api.openai.com/v1' }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REVIEW_RULES: .github/ai-review.md,AGENTS.md
          REVIEW_SEVERITY_THRESHOLD: P3
          # AUTO：P1/P0 自动 Request changes；P2/P3 只评论；默认不自动 Approve
          REVIEW_EVENT: AUTO
          REQUEST_CHANGES_ON: P1
          APPROVE_WHEN_CLEAN: 'false'
          # 可选：发现 P1/P0 时让 CI 失败
          # FAIL_ON: P1

